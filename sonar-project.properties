sonar.projectKey=mojaloop_account-lookup-service
sonar.organization=mojaloop

sonar.sources=src
sonar.tests=test

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test files are unit-test scaffolding with intentionally repetitive
# arrange/act/assert blocks. CPD across these mirrored suites adds
# noise without surfacing real refactoring opportunities.
sonar.cpd.exclusions=test/**/*
